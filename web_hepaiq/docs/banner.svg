<svg width="1200" height="380" viewBox="0 0 1200 380" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#0f2e2c"/>
      <stop offset="1" stop-color="#0d3b37"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#14b8a6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- фон -->
  <rect width="1200" height="380" rx="24" fill="url(#bg)"/>
  <circle cx="1010" cy="190" r="230" fill="url(#glow)"/>

  <!-- ЭКГ-линия -->
  <path d="M0 250 H150 L175 250 L195 210 L215 300 L235 150 L255 250 L300 250 L320 250 L340 235 L360 265 L385 250 H560"
        stroke="#2dd4bf" stroke-opacity="0.35" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- логотип-иконка -->
  <g transform="translate(64,60)">
    <rect width="56" height="56" rx="16" fill="url(#teal)"/>
    <path d="M12 30 H21 L25 20 L31 40 L35 28 H44" stroke="#04211f" stroke-width="3.2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  </g>

  <!-- пилюля-тег -->
  <g transform="translate(136,72)">
    <rect width="330" height="30" rx="15" fill="#14b8a6" fill-opacity="0.14" stroke="#2dd4bf" stroke-opacity="0.35"/>
    <text x="18" y="20" fill="#5eead4" font-size="14" font-weight="600" letter-spacing="1.5">ASTANA AI WEEK 2026  ·  ТРЕК 4 · ЗДРАВООХРАНЕНИЕ</text>
  </g>

  <!-- заголовок -->
  <text x="62" y="205" fill="#ffffff" font-size="82" font-weight="800" letter-spacing="-1">HepaIQ</text>

  <!-- подзаголовок -->
  <text x="66" y="248" fill="#cbd5e1" font-size="25" font-weight="500">ИИ-скрининг патологий печени и хронических вирусных гепатитов</text>
  <text x="66" y="280" fill="#7d97a5" font-size="17" font-weight="400">Инструмент поддержки врачебных решений · модель обучается в браузере на датасете ILPD</text>

  <!-- чипы технологий -->
  <g font-size="14" font-weight="600" fill="#a7f3d0">
    <g transform="translate(66,308)">
      <rect width="150" height="34" rx="9" fill="#0b1220" fill-opacity="0.5" stroke="#14b8a6" stroke-opacity="0.3"/>
      <text x="16" y="22">TensorFlow.js</text>
    </g>
    <g transform="translate(228,308)">
      <rect width="132" height="34" rx="9" fill="#0b1220" fill-opacity="0.5" stroke="#14b8a6" stroke-opacity="0.3"/>
      <text x="16" y="22">ILPD · N=583</text>
    </g>
    <g transform="translate(372,308)">
      <rect width="176" height="34" rx="9" fill="#0b1220" fill-opacity="0.5" stroke="#14b8a6" stroke-opacity="0.3"/>
      <text x="16" y="22">FIB-4 / APRI / NFS</text>
    </g>
    <g transform="translate(560,308)">
      <rect width="150" height="34" rx="9" fill="#0b1220" fill-opacity="0.5" stroke="#14b8a6" stroke-opacity="0.3"/>
      <text x="16" y="22">PDF-заключение</text>
    </g>
  </g>

  <!-- гейдж риска справа -->
  <g transform="translate(1010,190)">
    <circle r="96" fill="#0b1220" fill-opacity="0.45"/>
    <circle r="78" fill="none" stroke="#1e3a37" stroke-width="16"/>
    <circle r="78" fill="none" stroke="url(#teal)" stroke-width="16" stroke-linecap="round"
            stroke-dasharray="490" stroke-dashoffset="108" transform="rotate(-90)"/>
    <text x="0" y="-2" fill="#ffffff" font-size="46" font-weight="800" text-anchor="middle">78%</text>
    <text x="0" y="26" fill="#5eead4" font-size="15" font-weight="600" text-anchor="middle" letter-spacing="1">AI-РИСК</text>
  </g>
  <text x="1010" y="322" fill="#7d97a5" font-size="14" font-weight="500" text-anchor="middle">вероятность патологии печени</text>
</svg>
