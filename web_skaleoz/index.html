<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>skaleoz — скрининг осанки по фото</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    :root{
      --bg:#f4f7f4; --surface:#ffffff; --surface-2:#f2f6f3; --ink:#26302b; --ink-soft:#657069;
      --line:#e4ebe6; --accent:oklch(0.62 0.11 165); --accent-ink:oklch(0.42 0.1 165);
      --accent-soft:oklch(0.95 0.035 165); --accent-2:oklch(0.6 0.1 245);
      --warn:oklch(0.7 0.13 60); --warn-soft:oklch(0.96 0.05 75);
      --danger:oklch(0.62 0.16 25); --danger-soft:oklch(0.96 0.045 30);
      --good:oklch(0.62 0.11 165); --good-soft:oklch(0.95 0.035 165);
      --violet:#8b5cf6;
      --r-card:20px; --r-pill:34px; --r-in:12px;
      --sh-card:0 30px 70px -30px rgba(20,40,30,.18), 0 2px 6px rgba(20,40,30,.05);
      --sh-soft:0 1px 4px rgba(0,0,0,.06);
    }
    *{box-sizing:border-box}
    html,body{margin:0;background:var(--bg);color:var(--ink);
      font-family:'Plus Jakarta Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
    .mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
    input{font-family:inherit}
    .wrap{max-width:640px;margin:0 auto;padding:0 18px;width:100%}
    .app{min-height:100vh;display:flex;flex-direction:column}
    header.top{position:sticky;top:0;z-index:20;background:rgba(244,247,244,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
    .top-row{display:flex;align-items:center;gap:10px;padding:12px 18px}
    .brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:-.01em;padding:0}
    .brand .mk{width:32px;height:32px;border-radius:10px;background:var(--accent-soft);color:var(--accent-ink);display:grid;place-items:center}
    .brand small{font-weight:500;color:var(--ink-soft);font-size:12px;margin-left:2px}
    main{flex:1;padding:20px 0 8px}
    footer.disc{padding:18px 0 26px}
    .disc p{font-size:11.5px;line-height:1.6;color:var(--ink-soft);text-align:center;margin:0}

    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border-radius:var(--r-pill);font-weight:600;font-size:15px;transition:.16s}
    .btn-primary{background:var(--accent);color:#fff;box-shadow:0 10px 22px -12px var(--accent)}
    .btn-primary:hover{filter:brightness(1.05)}
    .btn-ghost{background:var(--surface);border:1px solid var(--line);color:var(--ink);box-shadow:var(--sh-soft)}
    .btn-ghost:hover{border-color:var(--accent)}
    .btn-block{width:100%}
    .icon-btn{width:38px;height:38px;border-radius:12px;background:var(--surface);border:1px solid var(--line);display:grid;place-items:center;box-shadow:var(--sh-soft)}
    .icon-btn:hover{border-color:var(--accent)}
    .lnk{color:var(--accent-ink);font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:6px; padding: 0;}

    .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--sh-card)}
    .pad{padding:20px}
    .fade{animation:fade .4s ease both}@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    .pop{animation:pop .45s cubic-bezier(.2,.9,.3,1.3) both}@keyframes pop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
    .spin{animation:sp 1s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
    .breathe{animation:br 3s ease-in-out infinite}@keyframes br{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
    .draw{stroke-dasharray:220;stroke-dashoffset:220;animation:draw 1.4s ease forwards}@keyframes draw{to{stroke-dashoffset:0}}

    .eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent-ink);display:inline-flex;align-items:center;gap:6px}
    .muted{color:var(--ink-soft)}
    .step-badge{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);background:var(--surface-2);padding:5px 12px;border-radius:var(--r-pill);border:1px solid var(--line)}
    h1{font-size:27px;line-height:1.15;letter-spacing:-.02em;margin:0;font-weight:800}
    h2{font-size:20px;letter-spacing:-.01em;margin:0;font-weight:700}
    .divider{display:flex;align-items:center;gap:12px;color:var(--ink-soft);font-size:11px;letter-spacing:.1em;font-weight:600;text-transform:uppercase;margin:16px 0}
    .divider::before,.divider::after{content:"";height:1px;flex:1;background:var(--line)}

    .field{width:100%;padding:14px 16px;border-radius:var(--r-in);border:1px solid var(--line);background:var(--surface);font-size:16px;color:var(--ink);outline:none;transition:.15s}
    .field:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}

    .row{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:14px;border:1px solid var(--line);background:var(--surface);transition:.14s;width:100%;text-align:left}
    .row:hover{border-color:var(--accent);box-shadow:var(--sh-soft)}
    .avatar{width:40px;height:40px;border-radius:11px;background:var(--accent-soft);color:var(--accent-ink);display:grid;place-items:center;font-weight:700;flex-shrink:0}
    .row .grow{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
    .row .grow .nm{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .row .grow .sub{font-size:12px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    .tip{display:flex;gap:12px;align-items:flex-start;padding:14px;border-radius:14px;background:var(--surface);border:1px solid var(--line)}
    .tip .ic{width:38px;height:38px;border-radius:11px;background:var(--surface-2);color:var(--accent-ink);display:grid;place-items:center;flex-shrink:0}
    .tip .t{font-weight:600;font-size:14px}
    .tip .d{font-size:12.5px;color:var(--ink-soft);line-height:1.45;margin-top:2px}

    .dropzone{display:block;border:2px dashed var(--line);border-radius:var(--r-card);background:var(--surface);padding:30px 20px;text-align:center;cursor:pointer;transition:.16s}
    .dropzone:hover{border-color:var(--accent);background:var(--accent-soft)}

    .art{display:block;margin:0 auto}
    .hero-art{width:150px;height:auto}

    .verdict{display:flex;align-items:center;gap:14px}
    .verdict .badge{width:52px;height:52px;border-radius:15px;display:grid;place-items:center;flex-shrink:0}
    .scale{height:10px;border-radius:var(--r-pill);background:var(--surface-2);position:relative;margin-top:8px}
    .scale .fill{height:100%;border-radius:var(--r-pill);background:linear-gradient(to right,var(--good),var(--warn),var(--danger));opacity:.28}
    .scale .knob{position:absolute;top:50%;transform:translate(-50%,-50%);width:16px;height:16px;border-radius:50%;background:#fff;border:3px solid var(--ink);box-shadow:0 2px 6px rgba(0,0,0,.2)}
    .scale-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--ink-soft);margin-top:6px}
    table.metrics{width:100%;border-collapse:collapse}
    table.metrics td{padding:11px 0;border-bottom:1px solid var(--line);font-size:14px}
    table.metrics tr:last-child td{border-bottom:none}
    table.metrics .v{text-align:right;font-weight:600}
    table.metrics .n{text-align:right;font-size:11px;color:var(--ink-soft);width:1%;white-space:nowrap;padding-left:14px}
    .legend{display:flex;flex-wrap:wrap;gap:14px;font-size:11.5px;color:var(--ink-soft);margin-top:10px}
    .legend i{width:11px;height:11px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:-1px}

    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    @media(max-width:520px){.grid2{grid-template-columns:1fr}}
    .stack>*+*{margin-top:15px}
    .navrow{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:22px;min-height:38px}

    .overlay-bg{position:fixed;inset:0;background:rgba(20,40,30,.4);backdrop-filter:blur(3px);z-index:40;display:grid;place-items:end center;padding:0}
    .overlay-bg.center{place-items:center;padding:18px}
    .sheet{background:var(--surface);border-radius:26px 26px 0 0;width:100%;max-width:600px;max-height:min(640px,88vh);
      display:flex;flex-direction:column;overflow:hidden;box-shadow:0 -20px 50px -20px rgba(20,40,30,.4);animation:up .3s ease both}
    .sheet-scroll{overflow-y:auto;flex:1;min-height:0}
    .sheet-foot{flex-shrink:0;border-top:1px solid var(--line)}
    @keyframes up{from{transform:translateY(100%)}to{transform:none}}
    .dialog{background:var(--surface);border-radius:22px;width:100%;max-width:380px;box-shadow:0 24px 60px -20px rgba(20,40,30,.45);
      animation:pop2 .22s cubic-bezier(.2,.9,.3,1.3) both;padding:22px 20px 20px}
    @keyframes pop2{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
    .chip{font-size:11px;font-weight:600;padding:4px 10px;border-radius:var(--r-pill);display:inline-block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:bottom}
    .dots span{display:inline-block;height:8px;border-radius:99px;transition:.2s;cursor:pointer}
    .actions{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .act{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border-radius:14px;border:1px solid var(--line);background:var(--surface);box-shadow:var(--sh-soft);font-size:12px;font-weight:600;color:var(--ink);transition:.14s}
    .act:hover{border-color:var(--accent);color:var(--accent-ink)}
    .act i{width:20px;height:20px}
    .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(18px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:14px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:60;box-shadow:0 10px 30px -8px rgba(20,40,30,.5)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
  <div id="app" class="app"></div>
  <div id="modal-root"></div>

  <script type="module">
    import { FilesetResolver, PoseLandmarker } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

    // ───────── illustrations (inline SVG, тема через CSS-переменные) ─────────
    const ART = {
      // фигура со спины: скан-рамка + позвоночник + линии плеч/таза
      posture: (cls='hero-art') => `<svg class="art ${cls}" viewBox="0 0 200 220" fill="none" role="img" style="height: 200px;width: 100%;" aria-label="Фигура со спины с разметкой позвоночника">
        <path d="M18 34 h20 M18 34 v20 M182 34 h-20 M182 34 v20 M18 186 h20 M18 186 v-20 M182 186 h-20 M182 186 v-20" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" opacity=".5"/>
        <ellipse cx="100" cy="208" rx="50" ry="7" fill="var(--accent-soft)"/>
        <path d="M62 80 Q57 150 70 198 L130 198 Q143 150 138 80 Q138 58 100 56 Q62 58 62 80 Z" fill="var(--accent-soft)" stroke="var(--accent)" stroke-width="2.5"/>
        <circle cx="100" cy="34" r="19" fill="var(--surface)" stroke="var(--accent)" stroke-width="2.5"/>
        <path class="draw" d="M100 60 Q106 108 96 156 Q93 178 100 194" stroke="var(--violet)" stroke-width="3" stroke-linecap="round"/>
        <line x1="66" y1="88" x2="134" y2="80" stroke="var(--accent)" stroke-width="4" stroke-linecap="round"/>
        <line x1="72" y1="168" x2="128" y2="174" stroke="var(--accent-2)" stroke-width="4" stroke-linecap="round"/>
        <g stroke="#fff" stroke-width="2"><circle cx="66" cy="88" r="5" fill="var(--accent)"/><circle cx="134" cy="80" r="5" fill="var(--accent)"/><circle cx="72" cy="168" r="5" fill="var(--accent-2)"/><circle cx="128" cy="174" r="5" fill="var(--accent-2)"/></g>
      </svg>`,
      // телефон снимает фигуру: чёткая ось взгляда камеры, свет ровно сверху
      camera: (cls='') => `<svg class="art ${cls}" viewBox="0 0 220 160" fill="none" role="img" style="height: 200px;width: 100%;" aria-label="Телефон фотографирует человека со спины при ровном свете">
        <g stroke="var(--warn)" stroke-width="2.2" stroke-linecap="round" opacity=".7"><path d="M92 14 v-9 M74 22 l-7 -6 M110 22 l7 -6"/><circle cx="92" cy="26" r="7" fill="var(--warn-soft)"/></g>
        <path d="M74 148 Q70 92 78 68 Q92 58 106 68 Q114 92 110 148 Z" fill="var(--accent-soft)" stroke="var(--accent)" stroke-width="2.5"/>
        <circle cx="92" cy="52" r="14" fill="var(--surface)" stroke="var(--accent)" stroke-width="2.5"/>
        <path class="draw" d="M92 68 Q96 104 90 142" stroke="var(--violet)" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M118 96 L152 96" stroke="var(--accent)" stroke-width="1.6" stroke-dasharray="4 4"/>
        <path d="M152 82 L118 96 L152 110" fill="none" stroke="var(--accent)" stroke-width="1.6" stroke-dasharray="3 4" opacity=".6"/>
        <rect x="156" y="58" width="44" height="80" rx="12" fill="var(--surface)" stroke="var(--accent-2)" stroke-width="2.5"/>
        <rect x="163" y="68" width="30" height="48" rx="5" fill="var(--accent-soft)"/><circle cx="178" cy="128" r="4" fill="var(--accent-2)"/>
      </svg>`,
      // анализ: скелет ключевых точек + лупа-галочка
      analyze: (cls='') => `<svg class="art ${cls}" viewBox="0 0 200 176" fill="none" role="img" style="height: 200px;width: 100%;" aria-label="Анализ ключевых точек">
        <path d="M74 48 Q70 112 82 154 L118 154 Q130 112 126 48 Q126 32 100 32 Q74 32 74 48 Z" fill="var(--accent-soft)" stroke="var(--accent)" stroke-width="2.5"/>
        <circle cx="100" cy="20" r="13" fill="var(--surface)" stroke="var(--accent)" stroke-width="2.5"/>
        <path d="M80 52 L100 40 L120 48 M82 132 L100 120 L118 132 M100 54 V120" stroke="var(--accent)" stroke-width="1.6" opacity=".55"/>
        <line x1="80" y1="52" x2="120" y2="48" stroke="var(--accent)" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="82" y1="132" x2="118" y2="132" stroke="var(--accent-2)" stroke-width="3.5" stroke-linecap="round"/>
        <path class="draw" d="M100 54 Q104 92 98 120" stroke="var(--violet)" stroke-width="2.5" stroke-linecap="round"/>
        <g stroke="#fff" stroke-width="1.5"><circle cx="80" cy="52" r="4.5" fill="var(--accent)"/><circle cx="120" cy="48" r="4.5" fill="var(--accent)"/><circle cx="82" cy="132" r="4.5" fill="var(--accent-2)"/><circle cx="118" cy="132" r="4.5" fill="var(--accent-2)"/></g>
        <circle cx="152" cy="42" r="19" fill="var(--surface)" stroke="var(--accent)" stroke-width="2.5"/>
        <path d="M165 55 l13 13" stroke="var(--accent)" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M145 42 l5 5 l10 -12" stroke="var(--accent)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`,
      empty: (cls='') => `<svg class="art ${cls}" viewBox="0 0 160 120" fill="none" role="img" style="height: 100px;width: 100%;" aria-label="Пока пусто">
        <rect x="40" y="26" width="80" height="80" rx="14" fill="var(--surface-2)" stroke="var(--line)" stroke-width="2"/>
        <rect x="56" y="16" width="48" height="18" rx="9" fill="var(--surface)" stroke="var(--accent)" stroke-width="2"/>
        <path d="M56 58 h30 M56 72 h48 M56 86 h38" stroke="var(--line)" stroke-width="3" stroke-linecap="round"/>
        <circle cx="112" cy="86" r="15" fill="var(--accent-soft)" stroke="var(--accent)" stroke-width="2"/>
        <path d="M106 86 l4 4 l8 -9" stroke="var(--accent)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`,
      shield: (cls='') => `<svg class="art ${cls}" viewBox="0 0 120 130" fill="none" role="img" style="height: 100px;width: 100%;" aria-label="Приватность — данные в браузере">
        <path d="M60 12 L102 26 V62 Q102 100 60 118 Q18 100 18 62 V26 Z" fill="var(--accent-soft)" stroke="var(--accent)" stroke-width="2.5"/>
        <path d="M44 62 l11 11 l22 -26" stroke="var(--accent)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`,
      // рентген позвоночника: тёмный кадр + светлые позвонки + линии Кобба
      xray: (cls='') => `<svg class="art ${cls}" viewBox="0 0 140 180" fill="none" role="img" style="height: 200px;width: 100%;" aria-label="Рентген позвоночника с измерением угла Кобба">
        <rect x="10" y="10" width="120" height="160" rx="10" fill="#171f2b" stroke="var(--accent-2)" stroke-width="2"/>
        <path class="draw" d="M70 26 Q78 60 64 92 Q52 122 74 154" stroke="#dfe8ee" stroke-width="5" stroke-linecap="round" opacity=".9"/>
        <g fill="#aebfca">${Array.from({length:9}).map((_,i)=>{const y=30+i*15,x=70+Math.sin(i/1.6)*10;return `<rect x="${x-9}" y="${y-4}" width="18" height="8" rx="2"/>`}).join('')}</g>
        <line x1="46" y1="34" x2="90" y2="30" stroke="var(--warn)" stroke-width="1.6" stroke-dasharray="3 3"/>
        <line x1="40" y1="100" x2="82" y2="96" stroke="var(--warn)" stroke-width="1.6" stroke-dasharray="3 3"/>
        <path d="M90 30 A6 6 0 0 1 88 40" stroke="var(--warn)" stroke-width="1.6" fill="none"/>
      </svg>`,
    };

    // ───────── state (без пациентов и истории — ничего не сохраняется) ─────────
    const S={ screen:'home',
      img:null, gate:null, metrics:null, thumb:null, gateIssues:null,
      modal:null, slide:0, modelLoading:false, poseLandmarker:null,
      onnxResult:null, onnxBusy:false, onnxErr:null, procStage:null,
      xrayImg:null, xrayResult:null, xrayErr:null, xrayBusy:false, xrayThumb:null,
      xrayFrom:'home', confirmDialog:null };
    const app=document.getElementById('app'), modalRoot=document.getElementById('modal-root');
    const icon=(n,cls='')=>`<i data-lucide="${n}" class="${cls}"></i>`;
    const fmtDate=d=>new Intl.DateTimeFormat('ru',{day:'numeric',month:'long',year:'numeric'}).format(d);
    const fmtDeg=v=>v==null?'—':v<1?'< 1°':'≈ '+Math.round(v)+'°';
    const fmtPct=v=>v==null?'—':v<1?'< 1%':'≈ '+Math.round(v)+'%';
    const withTimeout=(p,ms,msg)=>Promise.race([p,new Promise((_,rej)=>setTimeout(()=>rej(new Error(msg)),ms))]);

    // ───────── MediaPipe ─────────
    let modelPromise=null;
    function loadModel(){
      if(modelPromise) return modelPromise;
      S.modelLoading=true;
      modelPromise=(async()=>{
        const vision=await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
        S.poseLandmarker=await PoseLandmarker.createFromOptions(vision,{
          baseOptions:{modelAssetPath:"https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_heavy/float16/1/pose_landmarker_heavy.task",delegate:"GPU"},
          runningMode:"IMAGE",numPoses:2,minPoseDetectionConfidence:0.5,minPosePresenceConfidence:0.5,
        });
        S.modelLoading=false;
      })().catch(e=>{S.modelLoading=false;modelPromise=null;throw e;});
      return modelPromise;
    }

    function sharpnessScore(img){
      const iw=img.naturalWidth||img.width, ih=img.naturalHeight||img.height;
      const w=240,h=Math.round(240*ih/iw),c=document.createElement('canvas');c.width=w;c.height=h;
      const ctx=c.getContext('2d',{willReadFrequently:true});ctx.drawImage(img,0,0,w,h);
      const d=ctx.getImageData(0,0,w,h).data,g=new Float32Array(w*h);
      for(let i=0;i<w*h;i++)g[i]=0.299*d[i*4]+0.587*d[i*4+1]+0.114*d[i*4+2];
      let s=0,s2=0,n=0;
      for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){const i=y*w+x;const l=-g[i-w]-g[i-1]+4*g[i]-g[i+1]-g[i+w];s+=l;s2+=l*l;n++;}
      const m=s/n;return s2/n-m*m;
    }
    function runGate(img,poses){
      // мягкий гейт: блокируем только явный брак; ракурс/свет/частичный кадр → предупреждения
      const hard=[],warn=[],sharp=sharpnessScore(img);
      if(!poses||poses.length===0){hard.push('Человек не распознан. В кадре должна быть видна спина.');return{ok:false,issues:hard,warnings:warn,sharp,P:null};}
      if(poses.length>1) hard.push('В кадре несколько людей — нужен один.');

      const SZ=160,c=document.createElement('canvas');c.width=SZ;c.height=SZ;const ctx=c.getContext('2d');

        const img=await createImageBitmap(file);S.xrayImg=img;
        S.xrayResult=await runXrayModel(img);
        S.xrayThumb=makePlainThumb(img);
      }catch(e){ S.xrayErr='Не удалось обработать снимок: '+(e.message||e); }
      S.xrayBusy=false;S.screen='xrayResult';render();
    }

    async function processImage(file){
      S.onnxResult=null;S.onnxErr=null;S.procStage=null;
      S.screen='processing';render();
      try{
        const img=await createImageBitmap(file);S.img=img;
        await withTimeout(loadModel(),45000,'Модель не загрузилась за 45 секунд. Проверьте интернет и попробуйте снова.');
        if(!S.poseLandmarker) throw new Error('Модель недоступна. Обновите страницу при активном интернете.');
        const res=S.poseLandmarker.detect(img);
        const gate=runGate(img,res.landmarks);S.gate=gate;
        if(!gate.ok){S.gateIssues=gate.issues;S.screen='gateFail';render();return;}
        S.metrics=analyze(gate);S.thumb=makeThumb(img,gate.P);
        // вторая модель (ONNX) — в том же прогоне; её ошибка не валит результат
        S.procStage='ml';render();
        try{ S.onnxResult=await runOnnxModel(img); }catch(e){ S.onnxErr='ML-модель недоступна ('+(e.message||e)+')'; }
        S.procStage=null;S.screen='result';render();

          <div>${body}</div>
        </div></div>
        <div class="sheet-foot"><div class="wrap" style="padding:14px 18px;display:flex;align-items:center;justify-content:space-between">
          <div class="dots">${SLIDES.map((_,k)=>`<span data-slide="${k}" style="width:${k===i?'22px':'8px'};margin-right:6px;background:${k===i?'var(--accent)':'var(--line)'}"></span>`).join('')}</div>
          <div style="display:flex;gap:8px">
            ${i>0?`<button class="btn btn-ghost" data-act="slide-prev">${icon('arrow-left','')} Назад</button>`:''}
            ${i<SLIDES.length-1?`<button class="btn btn-primary" data-act="slide-next">Далее ${icon('arrow-right','')}</button>`:`<button class="btn btn-primary" data-act="close-modal">Понятно</button>`}
          </div>
        </div></div>
      </div></div>`;
    }

    // ───────── render ─────────
    function render(){
      const map={home:screenHome,guide:screenGuide,capture:screenCapture,processing:screenProcessing,gateFail:screenGateFail,result:screenResult,
        xrayUpload:screenXrayUpload,xrayProcessing:screenXrayProcessing,xrayResult:screenXrayResult};
      app.innerHTML=(map[S.screen]||screenHome)();
      if(window.lucide) lucide.createIcons();
      if(S.screen==='result'){const cv=document.getElementById('overlay');if(cv&&S.img&&S.gate?.P)drawOverlay(cv,S.img,S.gate.P);}
      if(S.screen==='guide'||S.screen==='capture') loadModel().catch(()=>{});
    }
    function modalConfirm(){
      if(!S.confirmDialog) return '';
      const d=S.confirmDialog;
      return `<div class="overlay-bg center"><div class="dialog">
        <div style="display:flex;align-items:flex-start;gap:14px">
          <span class="badge" style="width:44px;height:44px;background:var(--danger-soft);color:var(--danger);flex-shrink:0">${icon('alert-triangle','')}</span>
          <h2 style="font-size:17px;padding-top:4px">${d.title}</h2>
        </div>
        <p class="muted" style="font-size:13.5px;line-height:1.55;margin:12px 0 20px">${d.message}</p>
        <div style="display:flex;gap:10px">
          <button class="btn btn-ghost" style="flex:1" data-act="confirm-no">Отмена</button>
          <button class="btn btn-primary" style="flex:1;background:var(--danger);box-shadow:0 10px 22px -12px var(--danger)" data-act="confirm-yes">${d.confirmLabel}</button>
        </div>
      </div></div>`;
    }
    function askConfirm({title='Подтвердите действие',message,confirmLabel='Удалить',onConfirm}){
      S.confirmDialog={title,message,confirmLabel,onConfirm};renderModal();
    }
    function renderModal(){ modalRoot.innerHTML=S.confirmDialog?modalConfirm():modalHow(); if(window.lucide) lucide.createIcons(); }

    // ───────── events (делегируем на document → ловим и app, и модалку) ─────────
    document.addEventListener('change',e=>{
      if(e.target.id==='file'){const f=e.target.files?.[0];if(f)processImage(f);}
      if(e.target.id==='xrayfile'){const f=e.target.files?.[0];if(f)processXray(f);}
    });
    document.addEventListener('click',e=>{
      if(e.target.classList&&e.target.classList.contains('overlay-bg')){
        if(S.confirmDialog){S.confirmDialog=null;renderModal();return;}
        S.modal=null;renderModal();return;
      }
      const dot=e.target.closest('[data-slide]'); if(dot){S.slide=+dot.dataset.slide;renderModal();return;}
      const act=e.target.closest('[data-act]')?.dataset.act; if(!act) return;
      switch(act){
        // модалка — только renderModal(), страница не трогается (нет мигания)
        case 'how': S.modal='how';S.slide=0;renderModal();break;
        case 'close-modal': S.modal=null;renderModal();break;
        case 'confirm-no': S.confirmDialog=null;renderModal();break;
        case 'confirm-yes': { const cb=S.confirmDialog&&S.confirmDialog.onConfirm; S.confirmDialog=null; renderModal(); if(cb) cb(); break; }
        case 'slide-next': S.slide=Math.min(S.slide+1,SLIDES.length-1);renderModal();break;
        case 'slide-prev': S.slide=Math.max(S.slide-1,0);renderModal();break;
        // навигация
        case 'home': S.screen='home';S.modal=null;renderModal();render();break;
        case 'start': S.img=S.gate=S.metrics=S.thumb=null;S.screen='guide';render();break;
        case 'to-guide': S.screen='guide';render();break;
        case 'to-capture': S.screen='capture';render();break;
        case 'to-xray': S.xrayFrom=(S.screen==='capture')?'capture':'home';S.xrayImg=null;S.xrayResult=null;S.xrayErr=null;S.screen='xrayUpload';render();break;
        // заключение
        case 'dl-pdf': {const d=currentReportData();if(d)downloadPDF(d);break;}
        case 'print': {const d=currentReportData();if(d)printReport(d);break;}
        case 'copy': {const d=currentReportData();if(d)navigator.clipboard.writeText(reportText(d)).then(()=>toast('Скопировано в буфер')).catch(()=>toast('Не удалось скопировать'));break;}
      }
    });

    render();
  </script>
</body>
</html>
